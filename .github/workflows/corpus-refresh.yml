name: Corpus Refresh

on:
  workflow_dispatch:
    inputs:
      run_offshore_match_refresh:
        description: Refresh Offshore match index during this run
        required: false
        default: "false"
      embed_max_batches:
        description: Max embedding batches to run, 0 drains the queue
        required: false
        default: "30"
  schedule:
    - cron: "23 6 * * *"
    - cron: "23 18 * * *"

concurrency:
  group: corpus-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CAPITOL_CONGRESS_API_KEY: ${{ secrets.CAPITOL_CONGRESS_API_KEY }}
      CAPITOL_EMBEDDING_PROVIDER: openai
      CAPITOL_OPENAI_EMBEDDING_DIMENSIONS: "768"
      PYTHONUNBUFFERED: "1"
      RUN_OFFSHORE_MATCH_REFRESH: ${{ github.event.inputs.run_offshore_match_refresh || 'false' }}
      EMBED_MAX_BATCHES: ${{ github.event.inputs.embed_max_batches || '30' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[neon]"

      - name: Refresh FARA corpus
        run: |
          python -u -m capitol_pipeline ingest-fara \
            --mode bulk \
            --skip-existing \
            --with-match-index

      - name: Refresh CapitolExposed editorial corpus
        run: |
          python -u -m capitol_pipeline index-site-editorial \
            --only-missing

      - name: Refresh CapitolExposed core entity corpus
        run: |
          python -u -m capitol_pipeline index-site-core \
            --only-missing

      - name: Refresh official Congress bill context
        run: |
          if [ -z "${CAPITOL_CONGRESS_API_KEY}" ]; then
            echo "Skipping Congress.gov refresh because CAPITOL_CONGRESS_API_KEY is not configured."
            exit 0
          fi
          python -u -m capitol_pipeline sync-congress-bills \
            --limit-bills 75 \
            --only-stale \
            --rate-limit-cooldown-hours 6 \
            --with-search-index \
            --no-embeddings

      - name: Refresh Offshore match index when requested
        if: env.RUN_OFFSHORE_MATCH_REFRESH == 'true'
        run: |
          python -u -m capitol_pipeline ingest-offshore-leaks \
            --skip-nodes \
            --skip-relationships \
            --with-match-index

      - name: Embed queued corpus chunks
        run: |
          python -u -m capitol_pipeline embed-search-corpus \
            --batch-size 100 \
            --max-batches "${EMBED_MAX_BATCHES}"

      - name: Print corpus status
        run: python -u -m capitol_pipeline corpus-status
