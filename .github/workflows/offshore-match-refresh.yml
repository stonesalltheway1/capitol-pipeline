name: Offshore Match Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * 1"

concurrency:
  group: offshore-match-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CAPITOL_EMBEDDING_PROVIDER: openai
      CAPITOL_OPENAI_EMBEDDING_DIMENSIONS: "768"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[neon]"

      - name: Refresh Offshore Congress matches
        run: |
          python -u -m capitol_pipeline ingest-offshore-leaks \
            --skip-nodes \
            --skip-relationships \
            --with-match-index \
            --no-embeddings

      - name: Print corpus status
        run: python -u -m capitol_pipeline corpus-status
