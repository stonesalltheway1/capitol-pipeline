name: House Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: house-refresh
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CAPITOL_EMBEDDING_PROVIDER: none
      CAPITOL_OPENAI_EMBEDDING_DIMENSIONS: "768"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[neon,pymupdf]"

      - name: Run House ingest
        run: |
          HOUSE_YEAR="$(date -u +%Y)"
          python -u -m capitol_pipeline house-ingest \
            --year "$HOUSE_YEAR" \
            --batch-size 25 \
            --max-batches 6 \
            --with-search-index \
            --no-embeddings

      - name: Embed freshest House chunks
        if: env.OPENAI_API_KEY != ''
        env:
          CAPITOL_EMBEDDING_PROVIDER: openai
        run: |
          python -u -m capitol_pipeline embed-search-corpus \
            --source house-clerk \
            --batch-size 50 \
            --max-batches 1

      - name: Print corpus status
        run: python -u -m capitol_pipeline corpus-status

      - name: Notify app of new trades
        if: success() && env.PIPELINE_WEBHOOK_SECRET != ''
        env:
          PIPELINE_WEBHOOK_SECRET: ${{ secrets.PIPELINE_WEBHOOK_SECRET }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          # Query trades inserted in the last 20 minutes and notify the app
          python -u -c "
          import os, json, urllib.request, psycopg
          db = os.environ.get('NEON_DATABASE_URL') or os.environ.get('DATABASE_URL', '')
          if not db:
              print('No DATABASE_URL, skipping notify'); exit(0)
          conn = psycopg.connect(db)
          cur = conn.cursor()
          cur.execute(\"SELECT id FROM trades WHERE created_at >= NOW() - INTERVAL '20 minutes'\")
          ids = [r[0] for r in cur.fetchall()]
          cur.close(); conn.close()
          if not ids:
              print('No recent trades to notify about'); exit(0)
          print(f'Notifying app about {len(ids)} recent trades')
          base = os.environ.get('SITE_BASE_URL', 'https://www.capitolexposed.com')
          secret = os.environ['PIPELINE_WEBHOOK_SECRET']
          data = json.dumps({'trade_ids': ids, 'source': 'house-clerk'}).encode()
          req = urllib.request.Request(
              f'{base}/api/webhooks/new-trades',
              data=data,
              headers={'Authorization': f'Bearer {secret}', 'Content-Type': 'application/json'},
              method='POST')
          try:
              resp = urllib.request.urlopen(req, timeout=30)
              print(f'App notified: {resp.read().decode()[:200]}')
          except Exception as e:
              print(f'Notify failed (non-fatal): {e}')
          "
