name: House Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

concurrency:
  group: house-refresh
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CAPITOL_EMBEDDING_PROVIDER: none
      CAPITOL_OPENAI_EMBEDDING_DIMENSIONS: "768"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[neon,pymupdf]"

      - name: Run House ingest
        run: |
          HOUSE_YEAR="$(date -u +%Y)"
          python -u -m capitol_pipeline house-ingest \
            --year "$HOUSE_YEAR" \
            --batch-size 25 \
            --max-batches 6 \
            --with-search-index \
            --no-embeddings

      - name: Embed freshest House chunks
        if: env.OPENAI_API_KEY != ''
        env:
          CAPITOL_EMBEDDING_PROVIDER: openai
        run: |
          python -u -m capitol_pipeline embed-search-corpus \
            --source house-clerk \
            --batch-size 50 \
            --max-batches 1

      - name: Print corpus status
        run: python -u -m capitol_pipeline corpus-status
