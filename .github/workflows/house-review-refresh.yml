name: House Review Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

concurrency:
  group: house-review-refresh
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CAPITOL_EMBEDDING_PROVIDER: none
      CAPITOL_OPENAI_EMBEDDING_DIMENSIONS: "768"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[neon,pymupdf,ocr]"

      - name: Reprocess House review queue
        run: |
          python -u -m capitol_pipeline process-house-review \
            --limit 4 \
            --ocr-backend docling \
            --with-search-index \
            --no-embeddings

      - name: Embed refreshed House review chunks
        if: env.OPENAI_API_KEY != ''
        env:
          CAPITOL_EMBEDDING_PROVIDER: openai
        run: |
          python -u -m capitol_pipeline embed-search-corpus \
            --source house-clerk \
            --batch-size 50 \
            --max-batches 1

      - name: Print corpus status
        run: python -u -m capitol_pipeline corpus-status
