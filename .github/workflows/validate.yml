name: Validate

on:
  push:
  pull_request:

concurrency:
  group: pipeline-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,neon,pymupdf]"

      - name: Run tests
        run: pytest -q
