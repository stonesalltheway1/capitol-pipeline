name: Senate Reconcile

on:
  workflow_dispatch:
  schedule:
    - cron: "45 4 * * *"

concurrency:
  group: senate-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      QUIVER_API_TOKEN: ${{ secrets.QUIVER_API_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CAPITOL_EMBEDDING_PROVIDER: none
      CAPITOL_OPENAI_EMBEDDING_DIMENSIONS: "768"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pipeline
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[neon]"

      - name: Reconcile Senate trades
        if: env.QUIVER_API_TOKEN != ''
        run: |
          python -u -m capitol_pipeline senate-ingest \
            --provider quiver-bulk \
            --reconcile-lookback-days 14 \
            --page-size 250 \
            --with-search-index \
            --no-embeddings

      - name: Embed freshest Senate chunks
        if: env.OPENAI_API_KEY != ''
        env:
          CAPITOL_EMBEDDING_PROVIDER: openai
        run: |
          python -u -m capitol_pipeline embed-search-corpus \
            --source senate-quiver \
            --batch-size 50 \
            --max-batches 1

      - name: Print corpus status
        run: python -u -m capitol_pipeline corpus-status
